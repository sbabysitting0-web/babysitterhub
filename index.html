<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />

    <title>Find Trusted Babysitters Across Asia | BabyCare</title>
    <meta
      name="description"
      content="BabyCare helps families across Asia find verified babysitters, nannies, and childminders for safe and reliable childcare."
    />
    <meta
      name="keywords"
      content="babysitter asia, childcare asia, trusted babysitter, nanny, childminder, babycare"
    />
    <meta name="author" content="BabyCare" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#3DBEB5" />
    <link rel="canonical" href="https://www.babycare.sg/" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <!-- Open Graph -->
    <meta
      property="og:title"
      content="Find Trusted Babysitters Across Asia | BabyCare"
    />
    <meta
      property="og:description"
      content="Find verified babysitters, nannies, and childminders across Asia. Safe, reliable childcare for modern families."
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="BabyCare" />
    <meta property="og:locale" content="en_SG" />
    <meta property="og:url" content="https://www.babycare.sg/" />
    <meta property="og:image" content="https://www.babycare.sg/logo.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Find Trusted Babysitters Across Asia | BabyCare"
    />
    <meta
      name="twitter:description"
      content="Find verified babysitters, nannies, and childminders across Asia. Safe, reliable childcare for families."
    />
    <meta name="twitter:image" content="https://www.babycare.sg/logo.png" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "BabyCare",
        "url": "https://www.babycare.sg",
        "logo": "https://www.babycare.sg/logo.png",
        "email": "sbabysitting0@gmail.com",
        "sameAs": []
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "BabyCare",
        "url": "https://www.babycare.sg",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://www.babycare.sg/babysitters",
          "query-input": "required name=search_term_string"
        }
      }
    </script>

    <!-- Google Identity Services (for direct sign-in, bypasses supabase.co redirect) -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </head>

  <body>

    <script type="module" src="/src/main.tsx"></script>
